# DEV ONLY – credentials are public, never use outside compose.
# Mounted read-only into the livekit container as /etc/livekit.yaml.
port: 7880
bind_addresses:
  - ""     # all interfaces inside the container
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false
redis:
  address: redis:6379
keys:
  devkey: devsecret
webhook:
  api_key: devkey
  urls:
    - http://authd:8080/v1/webhooks/livekit
logging:
  level: warn
  sample: false
