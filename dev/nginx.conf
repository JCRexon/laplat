# Recordings file server (ADR-011). Byte fetches are authorised per-request by
# authd rather than by a static signed URL: nginx issues an internal auth_request
# subrequest carrying the ORIGINAL request line (X-Original-URI = the file path
# plus the ?t=<playback token>). authd verifies the token, confirms it is for
# this file, re-checks the viewer's entitlement live, audits the access, and
# answers 204 (allow) / 401 / 403. The recording bytes themselves never transit
# authd — nginx serves them directly once the subrequest allows.
server {
    listen 80;
    root /usr/share/nginx/html;

    location = /_recording_authz {
        internal;
        proxy_pass http://authd:8080/v1/recordings/authz;
        proxy_pass_request_body off;              # authz needs no body
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;  # original path + ?t=token
    }

    location / {
        auth_request /_recording_authz;           # 401/403 propagate to the client
        add_header Accept-Ranges bytes always;     # let browsers seek within videos
        try_files $uri =404;
    }
}
