<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>laplat</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash. Default is
      // the warm light theme; only an explicit "dark" choice sets the attribute.
      try {
        if (localStorage.getItem("lp-theme") === "dark") {
          document.documentElement.dataset.theme = "dark";
        }
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
