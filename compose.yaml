# Local, self-contained dev stack: Postgres + authd (with the dev console OTP
# sender) + SvelteKit web client + LiveKit server + egress recorder.
# `docker compose up --build`, then open http://localhost:5173.
# No Go/Node/Postgres install needed on the host.
#
# DEV ONLY. The OTP console sender logs login codes; the signing key has a
# checked-in default. Never use this compose file for anything real.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: laplat
      POSTGRES_PASSWORD: laplat
      POSTGRES_DB: laplat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laplat -d laplat"]
      interval: 2s
      timeout: 3s
      retries: 30

  # One-shot: wait for the DB, apply migrations with psql (the goose markers are
  # SQL comments; we feed only the Up sections), then exit. No goose/Go needed.
  migrate:
    image: postgres:16-alpine
    volumes:
      - ./migrations:/migrations:ro
    environment:
      PGHOST: db
      PGUSER: laplat
      PGPASSWORD: laplat
      PGDATABASE: laplat
    entrypoint:
      - sh
      - -c
      - |
        until pg_isready >/dev/null 2>&1; do echo "waiting for db..."; sleep 1; done
        if [ -n "$$(psql -tAc "SELECT to_regclass('public.users')")" ]; then
          echo "schema already present; skipping migrations"; exit 0
        fi
        for f in /migrations/0*.sql; do
          echo "applying $$(basename "$$f")"
          awk '/-- \+goose Up/{u=1;next} /-- \+goose Down/{u=0} u' "$$f" | grep -v '^-- +goose' \
            | psql -v ON_ERROR_STOP=1 -q
        done
        echo "migrations complete"
    depends_on:
      db:
        condition: service_healthy

  # DEV demo data: a fictitious instructor + published classes so the catalog
  # isn't empty during a walkthrough. Idempotent; waits for the schema. Remove
  # this service (or the file) for an empty catalog.
  seed:
    image: postgres:16-alpine
    volumes:
      - ./scripts/seed-demo.sql:/seed.sql:ro
    environment:
      PGHOST: db
      PGUSER: laplat
      PGPASSWORD: laplat
      PGDATABASE: laplat
    entrypoint:
      - sh
      - -c
      - |
        until [ -n "$$(psql -tAc "SELECT to_regclass('public.classes')")" ]; do
          echo "waiting for schema..."; sleep 1
        done
        psql -v ON_ERROR_STOP=1 -q -f /seed.sql
        echo "demo data seeded"
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Redis is required by the LiveKit server for inter-node signalling (even a
  # single-node dev deployment uses the Redis driver).
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  # LiveKit media server. Config is mounted from dev/livekit.yaml (DEV keys).
  # Exposes port 7880 for WebSocket so the browser client can connect directly.
  livekit:
    image: livekit/livekit-server:latest
    command: ["--config", "/etc/livekit.yaml", "--dev"]
    volumes:
      - ./dev/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    depends_on:
      redis:
        condition: service_healthy

  # LiveKit egress service: records room composites to files in the recordings
  # volume. Needs SYS_ADMIN for the Chrome headless sandbox and a larger /dev/shm.
  egress:
    image: livekit/egress:latest
    cap_add:
      - SYS_ADMIN
    shm_size: "1gb"
    volumes:
      - ./dev/egress.yaml:/etc/egress.yaml:ro
      - recordings:/out
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    depends_on:
      livekit:
        condition: service_started

  authd:
    build: .
    environment:
      LAPLAT_DB_DSN: postgres://laplat:laplat@db:5432/laplat?sslmode=disable
      LAPLAT_TOKEN_KID: dev-1
      # DEV default — override with your own base64 32-byte seed for anything real.
      LAPLAT_TOKEN_SIGNING_KEY: ${LAPLAT_TOKEN_SIGNING_KEY:-pBg48EH9AdNdFjvu1qiSMEicjZrH2YhR4ypuM4DZsn4=}
      LAPLAT_DEV_OTP_CONSOLE: "1"
      LAPLAT_HTTP_ADDR: ":8080"
      # LiveKit media infra — DEV keys from dev/livekit.yaml (never use in production).
      LAPLAT_LIVEKIT_API_KEY: devkey
      LAPLAT_LIVEKIT_API_SECRET: devsecret
      LAPLAT_LIVEKIT_URL: ws://livekit:7880
      # LAPLAT_LIVEKIT_HTTP_URL is derived from wss→https / ws→http; explicitly
      # set here because the LiveKit container is HTTP-only inside compose.
      LAPLAT_LIVEKIT_HTTP_URL: http://livekit:7880
      LAPLAT_LIVEKIT_FILE_PREFIX: /out
      # Base URL of the nginx recordings server (host-accessible for browser playback).
      LAPLAT_RECORDINGS_BASE_URL: http://localhost:9090
      # Shared secret for nginx secure_link URL signing. Must match RECORDINGS_SECRET
      # in the nginx service. DEV value — use a real secret in production.
      LAPLAT_RECORDINGS_SECRET: devrecordingssecret
    # Retry if it starts before Postgres is ready (startup DB ping fails -> exit).
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 3s
      retries: 30
    depends_on:
      migrate:
        condition: service_completed_successfully
      livekit:
        condition: service_started
    ports:
      - "8080:8080" # exposed for debugging; the web BFF reaches authd in-network

  # Serves completed recording files from the shared named volume. nginx
  # validates download requests using its built-in secure_link module: authd
  # signs each playbackUrl with a 1-hour HMAC-MD5 token (shared secret below),
  # and nginx rejects unsigned or expired requests without calling authd.
  nginx:
    image: nginx:alpine
    volumes:
      - recordings:/usr/share/nginx/html:ro
      - ./dev/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      RECORDINGS_SECRET: devrecordingssecret
      # Limit envsubst to only our variable so nginx's $uri/$arg_* are preserved.
      NGINX_ENVSUBST_TEMPLATE_VARS: RECORDINGS_SECRET
    ports:
      - "9090:80"
    depends_on:
      - egress

  web:
    build: ./web
    environment:
      API_BASE: http://authd:8080 # server-side BFF target (in-network)
      COOKIE_SECURE: "false"      # running a prod build over http://localhost
      ORIGIN: http://localhost:5173
      # Browser-side LiveKit WebSocket URL (the client connects directly to livekit).
      PUBLIC_LIVEKIT_URL: ws://localhost:7880
    depends_on:
      authd:
        condition: service_healthy
    ports:
      - "5173:3000"

# Named volume shared between egress (writes) and authd (reads path from webhook).
volumes:
  recordings:
